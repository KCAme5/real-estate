[pytest]
DJANGO_SETTINGS_MODULE = realestate.settings
python_files = tests.py test_*.py *_tests.py
addopts =
    --reuse-db
    --cov=.
    --cov-report=html
    --cov-report=term
    --cov-fail-under=0
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (isolated)
    integration: Integration tests (DB access)
    api: API endpoint tests
    e2e: End-to-end tests
    slow: Slow tests (skip with -m "not slow")
testpaths =
    accounts
    agents
    analytics
    bookings
    leads
    notifications
    payments
    properties
