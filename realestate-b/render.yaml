services:
  - type: web
    name: realestate-backend
    runtime: python
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p 10000 realestate.asgi:application
    envVars:
      - key: DATABASE_URI
        fromConfig: DATABASE_URI
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: MEDIA_ROOT
        value: "/var/data/media"
    disks:
      - name: media
        mountPath: /var/data
        sizeGB: 1
